{s:"Ein verlassener Schrein. Eine Opferschale glänzt.",l:"Münze stehlen",r:"Gold opfern",eL:{hp:0,g:10,rp:-15,it:null,fl:"Schrein bestohlen"},eR:{hp:15,g:-10,rp:10,it:null,fl:"Götter besänftigt"}},
{s:"Wölfe heulen. Der Waldpfad wird dunkler.",l:"Umkehren",r:"Durch den Wald",eL:{hp:0,g:0,rp:0,it:null,fl:null},eR:{hp:-20,g:0,rp:5,it:"Wolfsfell",fl:"Wald"}},
{s:"Banditen fordern Wegzoll: 15 Gold oder Kampf!",l:"Bezahlen",r:"Kämpfen!",eL:{hp:0,g:-15,rp:-5,it:null,fl:"Banditen bezahlt"},eR:{hp:-25,g:15,rp:10,it:"Banditenschwert",fl:"Banditen besiegt"}},

{s:"Ein Kind weint verloren im dunklen Wald.",l:"Ignorieren",r:"Zurückbringen",eL:{hp:0,g:0,rp:-10,it:null,fl:"Kind ignoriert"},eR:{hp:-5,g:0,rp:20,it:null,fl:"Kind gerettet"}},

{s:"Ein mysteriöser Turm. Die Tür steht offen.",l:"Vorbeigehen",r:"Betreten",eL:{hp:0,g:0,rp:0,it:null,fl:null},eR:{hp:-20,g:30,rp:0,it:"Zauberbuch",fl:"Turm erforscht"}},

{s:"Ein sterbender Ritter überreicht dir sein Siegel.",l:"Ablehnen",r:"Annehmen",eL:{hp:0,g:0,rp:0,it:null,fl:null},eR:{hp:0,g:0,rp:15,it:"Rittersiegel",fl:"Ritter-Erbe"}},
{s:"Pilzhändler: 'Probier mal! Gratis!'",l:"Nein!",r:"Kosten...",eL:{hp:0,g:0,rp:0,it:null,fl:null},eR:{hp:15,g:0,rp:0,it:null,fl:"Pilze"}},
{s:"Gewitter! Höhle mit leuchtenden Augen bietet Schutz.",l:"Im Regen weiter",r:"In die Höhle",eL:{hp:-10,g:0,rp:0,it:null,fl:null},eR:{hp:-15,g:20,rp:0,it:"Höhlenkristall",fl:"Höhle"}},
{s:"Wanderprediger bietet dir seinen Segen an.",l:"Weiter",r:"Segen nehmen",eL:{hp:0,g:0,rp:0,it:null,fl:null},eR:{hp:10,g:-3,rp:8,it:null,fl:"Gesegnet"}},
];

const FC={
"Händler-Deal":{s:"Der Händler ist zurück! 'Zeit den Gefallen einzulösen – schmuggle dieses Paket.'",l:"Verweigern",r:"Schmuggeln",eL:{hp:-10,g:0,rp:5,it:null,fl:null},eR:{hp:0,g:25,rp:-15,it:null,fl:"Schmuggler"}},
"Soldat geholfen":{s:"Der Soldat ist jetzt Hauptmann! Er bietet dir eine Eskorte an.",l:"Allein weiter",r:"Eskorte",eL:{hp:0,g:0,rp:5,it:null,fl:null},eR:{hp:10,g:0,rp:10,it:null,fl:"Militär"}},
"Kind gerettet":{s:"Die Mutter des Kindes schenkt dir einen Familien-Talisman!",l:"Ablehnen",r:"Annehmen",eL:{hp:0,g:0,rp:10,it:null,fl:null},eR:{hp:0,g:0,rp:5,it:"Talisman",fl:null}},
"Banditen besiegt":{s:"Die Banditen wollen Rache! Hinterhalt!",l:"Verhandeln",r:"Kämpfen!",eL:{hp:0,g:-20,rp:0,it:null,fl:null},eR:{hp:-20,g:25,rp:15,it:null,fl:"Banditenkönig"}},
"Turm erforscht":{s:"Das Zauberbuch vibriert! Runen leuchten auf.",l:"Wegwerfen",r:"Lesen",eL:{hp:0,g:0,rp:0,it:null,fl:null},eR:{hp:-15,g:0,rp:0,it:"Feuerzauber",fl:"Magie"}},
"Gefangenen befreit":{s:"Der Befreite war ein Adeliger! Einladung zum Schloss!",l:"Nein",r:"Ja!",eL:{hp:0,g:0,rp:0,it:null,fl:null},eR:{hp:10,g:30,rp:20,it:null,fl:"Adel"}},
"Ritter-Erbe":{s:"Ritter erkennen das Siegel und knien nieder!",l:"Zurückgeben",r:"Erbe annehmen",eL:{hp:0,g:0,rp:-5,it:null,fl:null},eR:{hp:0,g:20,rp:25,it:null,fl:"Kommandant"}},
"Schrein bestohlen":{s:"Ein Priester beschuldigt dich des Raubs! Wachen kommen!",l:"Gestehen",r:"Fliehen!",eL:{hp:0,g:-15,rp:10,it:null,fl:null},eR:{hp:-10,g:0,rp:-10,it:null,fl:"Flüchtig"}},
};

const CL=[
{n:"⚔ SÖLDNER",d:"Stark, wenig Diplomatie",hp:100,g:30,rp:20,it:["Langschwert"],e:"⚔️"},
{n:"🗡 DIEBIN",d:"Flink, gerissen, verhasst",hp:70,g:60,rp:10,it:["Dietrich"],e:"🗡️"},
{n:"🌿 KRÄUTERFRAU",d:"Weise Heilerin, arm",hp:80,g:15,rp:60,it:["Kräuter"],e:"🌿"},
];

let S={hp:100,g:50,rp:50,it:[],rd:0,cn:'',ce:'⚔️'};
let SR=[],AF=[],UF=new Set(),CC=null,drag=false,anim=false,sx=0,dx=0;
let engine=null,aiOK=false,aiName='none',aiTry=0,aiFB=0;

function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on')}
function sL(t,p){$('lst').textContent=t;$('lbr').style.width=p+'%'}
function badge(c,t){const b=$('badge');b.style.borderColor=b.style.color=c==='on'?'#0f0':c==='off'?'#f30':'#ff0';b.textContent=t}

function mkCard(f){return{situation:f.s,optionL:f.l,optionR:f.r,effectL:{hp:f.eL.hp,gold:f.eL.g,rep:f.eL.rp,itemAdd:f.eL.it,flag:f.eL.fl},effectR:{hp:f.eR.hp,gold:f.eR.g,rep:f.eR.rp,itemAdd:f.eR.it,flag:f.eR.fl}}}

async function init(){
show('s-load');sL('▶ Starte...',5);
await tryAI();
sL('▶ Bereit!',100);await sleep(500);
showChars();
}

async function tryAI(){
sL('▶ Prüfe WebGPU...',10);
if(!navigator.gpu){E('Kein WebGPU');sL('✗ Kein WebGPU – Fallback',90);badge('off','KI:OFF');$('ldt').textContent='Kein WebGPU im Browser';await sleep(1500);return}

try{
const ad=await navigator.gpu.requestAdapter();
if(!ad){E('Adapter null');sL('✗ GPU inkompatibel',90);badge('off','KI:OFF');await sleep(1500);return}
const info=await ad.requestAdapterInfo?.()??{};
L('GPU:',JSON.stringify(info));
$('ldt').textContent='GPU: '+(info.description||info.vendor||'OK');
}catch(e){E('Adapter-Fehler:',e);sL('✗ GPU-Fehler',90);badge('off','KI:OFF');await sleep(1500);return}

for(const mid of[M1,M2]){
L('Lade Modell:',mid);sL('▶ Lade '+mid.substring(0,25)+'...',25);badge('ld','KI:LADE...');
$('ldt').textContent='Erstmaliger Download kann Minuten dauern...';
try{
engine=await webllm.CreateMLCEngine(mid,{
initProgressCallback:(r)=>{
const p=Math.round(25+(r.progress||0)*65);
sL('▶ '+Math.round((r.progress||0)*100)+'%',p);
$('ldt').textContent=r.text||'';
L('Progress:',Math.round((r.progress||0)*100)+'%',r.text||'');
}});
aiOK=true;aiName=mid;
L('✓ MODELL GELADEN:',mid);
sL('✓ '+mid,95);badge('on','KI:'+mid.substring(0,18));

try{const t=await engine.chat.completions.create({messages:[{role:'user',content:'Sag OK'}],max_tokens:5,temperature:0});
L('Ping:',t.choices?.[0]?.message?.content)}catch(te){W('Ping fehl:',te.message)}
return;
}catch(e){E('Modell',mid,'FEHLER:',e.message,e.stack);engine=null;aiOK=false;$('ldt').textContent=e.message?.substring(0,80);await sleep(1000)}
}
E('ALLE MODELLE FEHLGESCHLAGEN');sL('✗ Kein Modell – Fallback',90);badge('off','KI:OFF');await sleep(1500);
}

function showChars(){
show('s-char');
$('ami').textContent=aiOK?'KI: '+aiName+' ✓':'Fallback-Modus (KI nicht verfügbar)';
const c=$('cops');c.innerHTML='';
CL.forEach((cl,i)=>{const d=document.createElement('div');d.className='cc nb p-4 w-56 rounded-sm text-center';
d.innerHTML=`<div class="text-4xl mb-2">${cl.e}</div><h3 class="nt text-lg mb-1">${cl.n}</h3><p class="text-green-700 text-[10px] mb-2">${cl.d}</p><div class="text-[10px] text-green-600">♥${cl.hp} ◆${cl.g} ★${cl.rp}<br>◰ ${cl.it.join(',')}</div>`;
d.onclick=()=>startGame(i);c.appendChild(d)});
}

function startGame(i){
const c=CL[i];S={hp:c.hp,g:c.g,rp:c.rp,it:[...c.it],rd:0,cn:c.n,ce:c.e};
SR=[];AF=[];UF.clear();aiTry=0;aiFB=0;$('log').innerHTML='';
L('Start:',c.n,'AI:',aiOK);show('s-game');ui();next();
}

function ui(){
const hp=clamp(S.hp,0,100);
$('bhp').style.width=hp+'%';$('bhp').className='sf'+(hp<=25?' dng':'');$('vhp').textContent=Math.max(0,S.hp);
$('bgl').style.width=clamp(S.g,0,100)+'%';$('vgl').textContent=Math.max(0,S.g);
$('brp').style.width=clamp(S.rp,0,100)+'%';$('vrp').textContent=Math.max(0,S.rp);
$('inv').textContent=S.it.length?S.it.join(', '):'[leer]';$('rnd').textContent=S.rd;
}

function addLog(t){const l=$('log'),e=document.createElement('div');e.className='border-l-2 border-green-900 pl-1';e.textContent='[R'+S.rd+'] '+t;l.prepend(e);while(l.children.length>3)l.removeChild(l.lastChild)}

async function next(){
if(anim)return;S.rd++;ui();
$('ctx').innerHTML='<span class="bk">█</span> Generiere...';$('oL').textContent='...';$('oR').textContent='...';$('csrc').textContent='...';
let card=null,src='FB';

if(AF.length&&Math.random()<.35){
for(let i=AF.length-1;i>=0;i--){if(FC[AF[i]]){card=mkCard(FC[AF[i]]);L('Flag-Karte:',AF[i]);AF.splice(i,1);src='FLG';break}}
}

if(!card&&aiOK){aiTry++;L('KI-Versuch #'+aiTry);card=await aiCard();if(card){src='AI';L('KI OK:',card.situation.substring(0,50))}else{aiFB++;W('KI fail. FB:',aiFB+'/'+aiTry)}}

if(!card){card=fbCard();src='FB'}

if(S.it.length&&Math.random()<.25){const it=S.it[Math.floor(Math.random()*S.it.length)];if(!card.optionR.includes(it)){card.optionR+=' ['+it+']';card.effectR.hp=Math.min(card.effectR.hp+5,25)}}

CC=card;$('csrc').textContent=src;render(card);
}

async function aiCard(){
try{
const fl=AF.length?'\nFLAGS (nutze als Konsequenz!): '+AF.join(', '):'';
const hi=SR.slice(-8).map(e=>'R'+e.rd+': '+e.ch+(e.fl?' ['+e.fl+']':'')).join('\n')||'Keine';
const it=S.it.length?'Inventar: '+S.it.join(',')+'. Baue Items ein!':'Kein Inventar.';

const sys=`Du bist Dungeon-Master. Antworte NUR mit JSON, KEIN anderer Text.
Format: {"situation":"...","optionL":"...","optionR":"...","effectL":{"hp":0,"gold":0,"rep":0,"itemAdd":null,"flag":null},"effectR":{"hp":0,"gold":0,"rep":0,"itemAdd":null,"flag":null}}
Regeln: Effekte -25 bis +25. Deutsch. Kreativ.`;

const usr=`Klasse:${S.cn} HP=${S.hp} Gold=${S.g} Ruf=${S.rp} ${it} Runde:${S.rd}${fl}
Historie:\n${hi}\nGeneriere eine Karte:`;

L('Prompt:',usr.substring(0,120)+'...');
const t0=performance.now();
const r=await engine.chat.completions.create({messages:[{role:'system',content:sys},{role:'user',content:usr}],temperature:.85,max_tokens:300,top_p:.9});
const ms=Math.round(performance.now()-t0);
const raw=r.choices?.[0]?.message?.content?.trim();
L('KI ('+ms+'ms):',raw);
if(!raw)throw new Error('Leer');
const m=raw.match(/\{[\s\S]*\}/);if(!m)throw new Error('Kein JSON: '+raw.substring(0,80));
const p=JSON.parse(m[0]);
if(!p.situation||!p.optionL||!p.optionR||!p.effectL||!p.effectR)throw new Error('Unvollständig');
for(const k of['effectL','effectR']){p[k].hp=clamp(parseInt(p[k].hp)||0,-25,25);p[k].gold=clamp(parseInt(p[k].gold)||0,-25,25);p[k].rep=clamp(parseInt(p[k].rep)||0,-25,25);p[k].itemAdd=typeof p[k].itemAdd==='string'?p[k].itemAdd:null;p[k].flag=typeof p[k].flag==='string'?p[k].flag:null}
return p;
}catch(e){E('aiCard FEHLER:',e.message,e.stack);return null}
}

function fbCard(){
const av=FB.filter((_,i)=>!UF.has(i));const pool=av.length?av:FB;
const pk=pool[Math.floor(Math.random()*pool.length)];
const oi=FB.indexOf(pk);if(oi>=0)UF.add(oi);if(UF.size>=FB.length)UF.clear();
return mkCard(pk);
}

function render(c){
const el=$('gc');el.style.transform='';
el.className='nb np bg-black w-[280px] h-[370px] sm:w-[320px] sm:h-[430px] flex flex-col rounded-sm relative ce';
el.style.touchAction='none';el.style.cursor='grab';
$('cart').textContent=emoji(c.situation);
$('ctx').textContent=c.situation;
$('oL').textContent='← '+c.optionL;
$('oR').textContent=c.optionR+' →';
$('hL').textContent=fEff(c.effectL);
$('hR').textContent=fEff(c.effectR);
swipe();
}

function emoji(t){t=t.toLowerCase();
if(t.includes('wolf'))return'🐺';if(t.includes('händler'))return'🏪';if(t.includes('bandit'))return'⚔️';
if(t.includes('gold')||t.includes('truhe'))return'💰';if(t.includes('magie')||t.includes('zauber'))return'✨';
if(t.includes('taverne'))return'🍺';if(t.includes('wald'))return'🌲';if(t.includes('nacht')||t.includes('schatten'))return'🌙';
if(t.includes('kind'))return'👶';if(t.includes('ratte'))return'🐀';if(t.includes('turm')||t.includes('schloss'))return'🏰';
if(t.includes('feuer'))return'🔥';if(t.includes('pilz'))return'🍄';if(t.includes('trank'))return'🧪';
if(t.includes('soldat')||t.includes('ritter'))return'🛡️';if(t.includes('dieb'))return'🦹';
if(t.includes('nebel'))return'🌫️';if(t.includes('prediger'))return'⛪';if(t.includes('fluss'))return'🌊';
return'⚔️'}

function fEff(e){const p=[];
if(e.hp)p.push('♥'+(e.hp>0?'+':'')+e.hp);if(e.gold)p.push('◆'+(e.gold>0?'+':'')+e.gold);
if(e.rep)p.push('★'+(e.rep>0?'+':'')+e.rep);if(e.itemAdd)p.push('+'+e.itemAdd);
return p.join(' ')||'—'}

function swipe(){
const c=$('gc'),hL=$('hL'),hR=$('hR');
c.onpointerdown=e=>{if(anim)return;drag=true;sx=e.clientX;dx=0;c.setPointerCapture(e.pointerId);c.style.transition='none'};
c.onpointermove=e=>{if(!drag)return;dx=e.clientX-sx;c.style.transform=`translateX(${dx}px) rotate(${dx*.08}deg)`;hL.style.opacity=dx<-40?1:0;hR.style.opacity=dx>40?1:0};
c.onpointerup=()=>{if(!drag)return;drag=false;if(dx<-80)pick('L');else if(dx>80)pick('R');else{c.style.transition='transform .3s';c.style.transform='';hL.style.opacity=hR.style.opacity=0}};
}

document.addEventListener('keydown',e=>{if(anim||!CC)return;if(e.key==='ArrowLeft'||e.key==='a')pick('L');if(e.key==='ArrowRight'||e.key==='d')pick('R')});

function pick(side){
if(anim||!CC)return;anim=true;
$('hL').style.opacity=$('hR').style.opacity=0;
const c=$('gc');c.style.transition='none';void c.offsetWidth;
c.classList.add(side==='L'?'sl':'sr');

const ef=side==='L'?CC.effectL:CC.effectR;
const tx=side==='L'?CC.optionL:CC.optionR;

S.hp=clamp(S.hp+(ef.hp||0),0,100);
S.g=Math.max(0,S.g+(ef.gold||0));
S.rp=clamp(S.rp+(ef.rep||0),0,100);

if(ef.itemAdd&&!S.it.includes(ef.itemAdd)){S.it.push(ef.itemAdd);if(S.it.length>6)S.it.shift()}
if(ef.flag){AF.push(ef.flag);if(AF.length>30)AF.shift();L('Flag:',ef.flag,'Alle:',AF)}

SR.push({rd:S.rd,si:CC.situation.substring(0,60),ch:tx,fl:ef.flag});
if(SR.length>20)SR.shift();

addLog(tx+' '+fEff(ef));ui();

if(ef.hp){const f=document.createElement('div');f.style.cssText='position:fixed;inset:0;z-index:10;pointer-events:none;animation:'+(ef.hp<0?'fR':'fG')+' .4s';document.body.appendChild(f);setTimeout(()=>f.remove(),500)}

setTimeout(()=>{anim=false;c.classList.remove('sl','sr');c.style.transform='';
if(S.hp<=0)gameOver();else next()},450);
}

function gameOver(){
L('GAME OVER R:',S.rd,'AI:',aiTry,'FB:',aiFB);
show('s-over');$('dc').textContent=S.cn;$('dr').textContent=S.rd;
const s=$('ds');s.innerHTML='';
if(!SR.length){s.innerHTML='Keine Taten.';return}
SR.forEach(e=>{const d=document.createElement('div');d.className='border-l-2 border-green-900 pl-2 py-1 mb-1';
d.innerHTML='<span class="text-green-800">R'+e.rd+'</span> '+e.ch+(e.fl?' <span class="text-yellow-600">['+e.fl+']</span>':'');s.appendChild(d)});
}

$('brs').onclick=()=>showChars();

init().catch(e=>{E('FATAL:',e);$('lst').textContent='✗ FEHLER: '+e.message;$('ldt').textContent='F12 für Details'});
</script>
</body>
</html>
